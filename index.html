<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Football</title>
    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/a10d8cc74e.js" crossorigin="anonymous"></script>
    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- header start -->
    <header>

    </header>
    <!-- header end -->
    <!-- main start-->
    <main>
        <!-- top tournament and banner section start -->
        <section class="top-banner">
            <div class="container">
                <div class="tournaments">
                    <div class="tournament">
                        <div class="tournament-title">
                            <h1>Conmebol<br>
                                Copa America<br>
                                2021</h1>
                        </div>
                        <div class="link-button">
                            <a target="_blank" href="https://web.programming-hero.com/">Watch Live</a>
                            <a target="_blank" href="https://web.programming-hero.com/"><i
                                    class="fas fa-arrow-right "></i></a>
                        </div>
                    </div>
                    <div class="top-banner">
                        <img src="images/banner/banner.png" alt="">
                    </div>
                </div>
            </div>
        </section>
        <!-- top tournament and banner section end -->
        <!-- players identity section start -->
        <section>
            <div class="players-identity">
                <div class="players">
                    <div class="player">
                        <img src="images/players/player-1.png" alt="">
                        <h3>Neymar Jr</h3>
                        <p>

                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- main end -->
</body>

</html>
